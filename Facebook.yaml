  - DOMAIN-SUFFIX,fbcdn.com
  - DOMAIN-SUFFIX,fbsbx.com          # 附件 / 沙盒内容
  - DOMAIN-SUFFIX,cdninstagram.com   # IG 静态资源
  - DOMAIN-SUFFIX,fbedge.net         # 边缘节点
  - DOMAIN-SUFFIX,akamaihd.net       # 协力厂商 CDN
  - DOMAIN-SUFFIX,tfbnw.net          # FB 骨干网

  # --- 3. 多媒体 / 广告 / 登录验证 ---
  - DOMAIN-SUFFIX,fbaddins.com
  - DOMAIN-SUFFIX,fbiov.com
  - DOMAIN-SUFFIX,fbthirdpartymedia.com
  - DOMAIN-SUFFIX,accountkit.com     # 登录校验服务

  # --- 4. 企业服务 / VR 硬件生态 ---
  - DOMAIN-SUFFIX,workplace.com
  - DOMAIN-SUFFIX,work.facebook.com
  - DOMAIN-SUFFIX,fb.work
  - DOMAIN-SUFFIX,oculus.com
  - DOMAIN-SUFFIX,oculuscdn.com

  # --- 5. 核心关键字兜底 ---
  - DOMAIN-KEYWORD,facebook
  - DOMAIN-KEYWORD,instagram
  - DOMAIN-KEYWORD,whatsapp

